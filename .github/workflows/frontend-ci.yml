name: Frontend CI

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"

  pull_request:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"

  workflow_dispatch:

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10.6.5"
  GAR_REGISTRY: asia-southeast1-docker.pkg.dev
  GAR_IMAGE: asia-southeast1-docker.pkg.dev/c2-app-501203/fleet-dispatch-images/frontend

jobs:
  quality:
    name: Lint and build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

  source-security:
    name: Scan source code
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scan source code with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: frontend
          scanners: vuln,secret,misconfig
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
        env:
          TRIVY_INCLUDE_DEV_DEPS: "true"

  container:
    name: Build and scan container
    runs-on: ubuntu-latest

    needs:
      - quality
      - source-security

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Docker Hardened Images
        uses: docker/login-action@v4
        with:
          registry: dhi.io
          username: ${{ secrets.DHI_USERNAME }}
          password: ${{ secrets.DHI_TOKEN }}

      - name: Build container image
        run: |
          docker build \
            --tag "${{ env.GAR_IMAGE }}:${{ github.sha }}" \
            frontend

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.GAR_IMAGE }}:${{ github.sha }}
          scanners: vuln
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

      - name: Authenticate to Google Cloud
        if: github.event_name != 'pull_request'
        id: google-auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Authenticate to Artifact Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GAR_REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.google-auth.outputs.access_token }}

      - name: Push image
        if: github.event_name != 'pull_request'
        run: |
          docker push "${{ env.GAR_IMAGE }}:${{ github.sha }}"
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            docker tag "${{ env.GAR_IMAGE }}:${{ github.sha }}" "${{ env.GAR_IMAGE }}:latest"
            docker push "${{ env.GAR_IMAGE }}:latest"
          fi
